name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit
      - name: Build
        run: npm run build
      - name: Smoke test (health)
        run: |
          sleep 2
          curl -s -o /dev/null -w "http_code:%{http_code}\n" https://app.albassam-app.com/api/health || true
