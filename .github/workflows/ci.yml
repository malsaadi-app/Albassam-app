name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -p tsconfig.json --noEmit

      - name: Lint
        run: npm run lint --if-present || true

      - name: Build
        run: npm run build --if-present

      - name: Run unit tests
        run: npm test --if-present || true

      - name: Run Playwright smoke tests (headless)
        env:
          BASE_URL: https://app.albassam-app.com
          E2E_HR_USERNAME: ${{ secrets.E2E_HR_USERNAME }}
          E2E_HR_PASSWORD: ${{ secrets.E2E_HR_PASSWORD }}
        run: |
          npx playwright install --with-deps
          npx playwright test tests/e2e/auth.spec.ts --project=chromium --reporter=list || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run npm audit
        run: npm ci && npm audit --audit-level=moderate || true

# Notes:
# - Add required repository secrets via Settings -> Secrets: E2E_HR_USERNAME, E2E_HR_PASSWORD, and any API keys.
# - This workflow is conservative: it doesn't fail the job on lint/test errors (set as appropriate for your release policy).
