name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: macos-latest # Use latest available macOS runner
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Create placeholder web directory
      run: |
        mkdir -p out
        echo '<!DOCTYPE html><html><body><p>Loading from production...</p></body></html>' > out/index.html
    
    - name: Sync Capacitor
      run: |
        npx cap sync ios
    
    - name: Import certificates
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        
    - name: Import provisioning profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -D > profile.mobileprovision
        PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
        echo "✅ Provisioning profile installed: $PROFILE_UUID"
    
    - name: Build iOS app
      run: |
        cd ios/App
        
        # Get provisioning profile info
        PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
        PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
        PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
        
        echo "📋 Provisioning Profile:"
        echo "  Name: $PROFILE_NAME"
        echo "  UUID: $PROFILE_UUID"
        
        # Build with proper signing
        echo "🔨 Building iOS app with Manual signing..."
        xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath $PWD/build/App.xcarchive \
          archive \
          CODE_SIGN_STYLE=Manual \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          PROVISIONING_PROFILE_SPECIFIER="$PROFILE_UUID" \
          PRODUCT_BUNDLE_IDENTIFIER=com.albassam.hrapp
    
    - name: Export IPA
      run: |
        cd ios/App
        
        # Get provisioning profile info
        PROFILE_PATH=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision | head -1)
        PROFILE_UUID=$(basename "$PROFILE_PATH" .mobileprovision)
        PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)
        
        echo "📋 Provisioning Profile:"
        echo "  UUID: $PROFILE_UUID"
        echo "  Name: $PROFILE_NAME"
        
        # Update existing exportOptions.plist with profile UUID
        /usr/libexec/PlistBuddy -c "Delete :provisioningProfiles" exportOptions.plist 2>/dev/null || true
        /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" exportOptions.plist
        /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.albassam.hrapp string $PROFILE_UUID" exportOptions.plist
        
        echo "✅ Export options created with profile UUID: $PROFILE_UUID"
        
        # Export IPA
        echo "📦 Exporting IPA..."
        xcodebuild -exportArchive \
          -archivePath $PWD/build/App.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath $PWD/build
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: ios/App/build/*.ipa
    
    - name: Upload to App Store Connect (optional)
      if: github.ref == 'refs/heads/main'
      env:
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        xcrun altool --upload-app \
          -f ios/App/build/*.ipa \
          -t ios \
          --apiKey $APP_STORE_CONNECT_API_KEY
