name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: macos-latest # Use latest available macOS runner
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Create placeholder web directory
      run: |
        mkdir -p out
        echo '<!DOCTYPE html><html><body><p>Loading from production...</p></body></html>' > out/index.html
    
    - name: Sync Capacitor
      run: |
        npx cap sync ios
    
    - name: Import certificates
      env:
        CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE }}
        TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      run: |
        # Create temporary keychain
        security create-keychain -p "temppass" build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "temppass" build.keychain
        security set-keychain-settings -t 3600 -l build.keychain
        
        # Import certificate
        echo "$CERTIFICATE_BASE64" | base64 -D -o certificate.p12
        security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
        security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temppass" build.keychain
        
        # Import provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        PROFILE_UUID=$(security cms -D -i <(echo "$PROVISIONING_PROFILE_BASE64" | base64 -D) | grep -A1 UUID | grep string | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '\t')
        echo "$PROVISIONING_PROFILE_BASE64" | base64 -D > ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
    
    - name: Build iOS app
      run: |
        cd ios/App
        xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath $PWD/build/App.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="iPhone Distribution" \
          CODE_SIGN_STYLE=Manual \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}
    
    - name: Export IPA
      run: |
        cd ios/App
        xcodebuild -exportArchive \
          -archivePath $PWD/build/App.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath $PWD/build \
          -allowProvisioningUpdates
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: ios/App/build/*.ipa
    
    - name: Upload to App Store Connect (optional)
      if: github.ref == 'refs/heads/main'
      env:
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        xcrun altool --upload-app \
          -f ios/App/build/*.ipa \
          -t ios \
          --apiKey $APP_STORE_CONNECT_API_KEY
