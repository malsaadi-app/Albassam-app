name: iOS Build

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: macos-latest # Use latest available macOS runner
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest-stable'
    
    - name: Create placeholder web directory
      run: |
        mkdir -p out
        echo '<!DOCTYPE html><html><body><p>Loading from production...</p></body></html>' > out/index.html
    
    - name: Sync Capacitor
      run: |
        npx cap sync ios
    
    - name: Import certificates
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_P12 }}
        p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        
    - name: Import provisioning profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.APPLE_PROVISIONING_PROFILE }}" | base64 -D > profile.mobileprovision
        PROFILE_UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
        cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
        echo "✅ Provisioning profile installed: $PROFILE_UUID"
    
    - name: Build iOS app
      run: |
        cd ios/App
        
        xcodebuild -project App.xcodeproj \
          -scheme App \
          -configuration Release \
          -sdk iphoneos \
          -destination 'generic/platform=iOS' \
          -archivePath $PWD/build/App.xcarchive \
          archive \
          CODE_SIGN_STYLE=Automatic \
          DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
          -allowProvisioningUpdates
    
    - name: Export IPA
      run: |
        cd ios/App
        xcodebuild -exportArchive \
          -archivePath $PWD/build/App.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath $PWD/build \
          -allowProvisioningUpdates
    
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-app
        path: ios/App/build/*.ipa
    
    - name: Upload to App Store Connect (optional)
      if: github.ref == 'refs/heads/main'
      env:
        APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
      run: |
        xcrun altool --upload-app \
          -f ios/App/build/*.ipa \
          -t ios \
          --apiKey $APP_STORE_CONNECT_API_KEY
